name: Module Common CI
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      package-path:
        required: true
        type: string

env:
  # Setting an environment variable with the value of a configuration variable
  PUBLISH_BRANCH: "refs/heads/main"
  PACKAGE_NAME: "unknown"
  PACKAGE_VERSION: "unknown"
  NPM_VERSION: "unknown"
  HAVE_VALIDATE_SCRIPT: true
  HAVE_LINT_SCRIPT: true
  HAVE_TEST_SCRIPT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: luolapeikko/github-actions/read-package-info@v0
        with:
          working-directory: ${{ inputs.package-path }}
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace deps
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Validate
        if: env.HAVE_VALIDATE_SCRIPT == 'true'
        run: pnpm run validate

      - name: Test
        if: env.HAVE_TEST_SCRIPT == 'true'
        run: pnpm test

      - name: Lint
        if: env.HAVE_LINT_SCRIPT == 'true'
        run: pnpm run lint

      - name: Dry-run publish ${{env.PACKAGE_NAME}} ${{env.PACKAGE_VERSION}}
        working-directory: ${{ inputs.package-path }}
        if: |
          github.ref == env.PUBLISH_BRANCH &&
          env.PACKAGE_VERSION == env.NPM_VERSION
        run: npm publish --dry-run

      - name: Publish ${{env.PACKAGE_NAME}} ${{env.PACKAGE_VERSION}}
        working-directory: ${{ inputs.package-path }}
        if: |
          github.ref == env.PUBLISH_BRANCH &&
          env.PACKAGE_VERSION != env.NPM_VERSION
        run: npm publish --access public
